name: Build and Deploy Media Processor

on:
  push:
    branches: [ main, master ] # 當你 push 到這兩個分支時觸發

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-east1
  REPOSITORY: media-processor-repo
  IMAGE_NAME: main-app

jobs:
  # 第一階段：在 GitHub 上編譯 Java 並打包 Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. 編譯 Jar 包 (跳過測試以加速)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 登入 Google Cloud
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. 設定 Docker 認證，讓它能推送到 Google Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 4. 建立 Image 並推送到倉庫
      - name: Build and Push Image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker build -t $IMAGE .
          docker push $IMAGE

  # 第二階段：連進 GCP VM 更新服務
  deploy:
    needs: build-and-push # 確保 Image 推成功了才執行
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/Media_Processor
            
            # 1. 確保 VM 有權限拉取（在 COS 上這步很重要）
            # 如果 VM 已經有 Full API Access，這行通常很快
            gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet
            
            # 2. 拉取最新映像檔
            IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            docker pull $IMAGE

            # 設定 tag 給 compose 用
            echo "IMAGE_TAG=${{ github.sha }}" > .env
            
            # 3. 重新啟動容器 (使用你習慣的 COS 跑法)
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:$PWD" -w "$PWD" \
              docker/compose:1.29.2 down

            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:$PWD" -w "$PWD" \
              docker/compose:1.29.2 up -d
            
            # 4. 清理舊的不用的 Image，節省 20GB 的硬碟空間
            docker image prune -f