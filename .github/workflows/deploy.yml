name: Build and Deploy Media Processor

on:
  push:
    branches: [ main, master ] # 當你 push 到這兩個分支時觸發

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-east1
  REPOSITORY: media-processor-repo
  IMAGE_NAME: main-app

jobs:
  # 第一階段：在 GitHub 上編譯 Java 並打包 Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. 編譯 Jar 包 (跳過測試以加速)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 登入 Google Cloud
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. 設定 Docker 認證，讓它能推送到 Google Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 4. 建立 Image 並推送到倉庫
      - name: Build and Push Image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker build --build-arg BUILD_VERSION=${{ github.sha }} -t $IMAGE .
          docker push $IMAGE
      # 加上 debug log
      - name: Debug commit
        run: |
          echo "SHA=${{ github.sha }}"
          git log -1

  # 第二階段：連進 GCP VM 更新服務
  deploy:
    needs: build-and-push # 確保 Image 推成功了才執行
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/Media_Processor
            
            # 1. 更新 .env 檔案 (這是給 Compose 讀取 IMAGE_TAG 的)
            echo "IMAGE_TAG=${{ github.sha }}" > .env
            
            # 2. 登入 (如果 VM 本身有 Service Account 權限，這步失敗也沒關係)
            gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet || true
            
            # 3. 指定映像檔全名
            IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            # 4. 強制拉取 (確保新版 Image 在本機)
            docker pull $IMAGE

            # 5. 執行 Compose Down & Up
            # 這裡增加 --env-file .env 確保變數 100% 被載入
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:$PWD" -w "$PWD" \
              docker/compose:1.29.2 --env-file .env down

            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:$PWD" -w "$PWD" \
              docker/compose:1.29.2 --env-file .env up -d

            # 6. 清理
            docker image prune -f